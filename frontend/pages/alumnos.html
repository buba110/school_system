<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alumnos - Control Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .content { background: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar completo -->
        <div class="col-md-2 sidebar p-0">
            <div class="text-center py-3 bg-dark text-white"><h5><i class="fas fa-school"></i> Escuela</h5></div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="alumnos.html"><i class="fas fa-users"></i> Alumnos</a>
            <a href="grados.html"><i class="fas fa-layer-group"></i> Grados</a>
            <a href="grupos.html"><i class="fas fa-users-between"></i> Grupos</a>
            <a href="materias.html"><i class="fas fa-book"></i> Materias</a>
            <a href="colegiaturas.html"><i class="fas fa-dollar-sign"></i> Colegiaturas</a>
            <a href="pos.html"><i class="fas fa-shopping-cart"></i> Punto de Venta</a>
            <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
            <a href="proveedores.html"><i class="fas fa-truck"></i> Proveedores</a>
            <a href="movimientos.html"><i class="fas fa-exchange-alt"></i> Movimientos</a>
            <a href="usuarios.html"><i class="fas fa-user-shield"></i> Usuarios</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="cortes.html"><i class="fas fa-cash-register"></i> Corte de Caja</a>
            <a href="#" id="logoutBtn" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>

        <!-- Contenido -->
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-users"></i> Alumnos</h2>
            <button class="btn btn-success mb-3" onclick="nuevoAlumno()"><i class="fas fa-plus"></i> Nuevo Alumno</button>
            <table class="table table-bordered table-hover" id="tablaAlumnos">
                <thead class="table-dark">
                    <tr><th>Matrícula</th><th>Nombre</th><th>Tutor</th><th>Teléfono</th><th>Acciones</th></tr>
                </thead>
                <tbody id="alumnosBody"></tbody>
            </table>
            <hr>
            <h3>Inscripciones</h3>
            <div class="row">
                <div class="col-md-4">
                    <label>Seleccionar alumno</label>
                    <select id="selectAlumnoInsc" class="form-select"></select>
                    <button id="btnVerInsc" class="btn btn-primary mt-2">Ver inscripciones</button>
                    <button id="btnNuevaInsc" class="btn btn-success mt-2">Nueva inscripción</button>
                </div>
                <div class="col-md-8">
                    <table class="table table-bordered">
                        <thead class="table-dark">
                            <tr><th>Ciclo</th><th>Grado</th><th>Grupo</th><th>Fecha</th></tr>
                        </thead>
                        <tbody id="tablaInscripciones"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal para nueva inscripción -->
<div class="modal fade" id="inscModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5>Nueva inscripción</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="alumnoIdInsc">
                <div class="mb-2"><label>Ciclo escolar</label><input id="ciclo" class="form-control" value="2024-2025"></div>
                <div class="mb-2"><label>Grado</label><select id="gradoInsc" class="form-select"></select></div>
                <div class="mb-2"><label>Grupo</label><select id="grupoInsc" class="form-select"></select></div>
                <div class="mb-2"><label>Monto mensual colegiatura</label><input id="montoMensual" class="form-control" value="1500"></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" onclick="guardarInscripcion()">Inscribir</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

// CRUD Alumnos
async function cargarAlumnos() {
    const res = await fetch(`${API_URL}/alumnos`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const tbody = document.getElementById('alumnosBody');
    tbody.innerHTML = '';
    data.forEach(a => {
        tbody.innerHTML += `
            <tr>
                <td>${a.matricula}</td>
                <td>${a.nombre_completo}</td>
                <td>${a.tutor_nombre || '-'}</td>
                <td>${a.tutor_telefono || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editarAlumno(${a.id})"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="eliminarAlumno(${a.id})"><i class="fas fa-trash"></i> Eliminar</button>
                </td>
            </tr>
        `;
    });
}
window.nuevoAlumno = () => {
    const mat = prompt('Matrícula:');
    const nom = prompt('Nombre completo:');
    const tutor = prompt('Tutor:');
    if(mat && nom) fetch(`${API_URL}/alumnos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ matricula: mat, nombre_completo: nom, tutor_nombre: tutor })
    }).then(() => cargarAlumnos());
};
window.editarAlumno = async (id) => {
    const res = await fetch(`${API_URL}/alumnos/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const a = await res.json();
    const nuevoNom = prompt('Nuevo nombre:', a.nombre_completo);
    if(nuevoNom) await fetch(`${API_URL}/alumnos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ ...a, nombre_completo: nuevoNom })
    }).then(() => cargarAlumnos());
};
window.eliminarAlumno = async (id) => {
    if(confirm('¿Eliminar alumno?')) await fetch(`${API_URL}/alumnos/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }).then(() => cargarAlumnos());
};

// Inscripciones
async function cargarAlumnosSelect() {
    const res = await fetch(`${API_URL}/alumnos`, { headers: { 'Authorization': `Bearer ${token}` } });
    const alumnos = await res.json();
    const select = document.getElementById('selectAlumnoInsc');
    select.innerHTML = '<option value="">Seleccione alumno</option>';
    alumnos.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nombre_completo}</option>`);
}
document.getElementById('btnVerInsc').onclick = async () => {
    const id = document.getElementById('selectAlumnoInsc').value;
    if(!id) return alert('Seleccione alumno');
    const res = await fetch(`${API_URL}/inscripciones/alumno/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const tbody = document.getElementById('tablaInscripciones');
    tbody.innerHTML = '';
    data.forEach(i => tbody.innerHTML += `<tr><td>${i.ciclo_escolar}</td><td>${i.grado_nombre}</td><td>${i.grupo_nombre}</td><td>${i.fecha_inscripcion}</td></tr>`);
};
document.getElementById('btnNuevaInsc').onclick = async () => {
    const id = document.getElementById('selectAlumnoInsc').value;
    if(!id) return alert('Seleccione alumno');
    document.getElementById('alumnoIdInsc').value = id;
    // Cargar grados
    const gradosRes = await fetch(`${API_URL}/catalogos/grados`, { headers: { 'Authorization': `Bearer ${token}` } });
    const grados = await gradosRes.json();
    const selectGrado = document.getElementById('gradoInsc');
    selectGrado.innerHTML = '<option value="">Seleccione grado</option>';
    grados.forEach(g => selectGrado.innerHTML += `<option value="${g.id}">${g.nombre}</option>`);
    selectGrado.onchange = async () => {
        const gradoId = selectGrado.value;
        if(!gradoId) return;
        const gruposRes = await fetch(`${API_URL}/catalogos/grupos`, { headers: { 'Authorization': `Bearer ${token}` } });
        let grupos = await gruposRes.json();
        grupos = grupos.filter(g => g.grado_id == gradoId);
        const selectGrupo = document.getElementById('grupoInsc');
        selectGrupo.innerHTML = '<option value="">Seleccione grupo</option>';
        grupos.forEach(g => selectGrupo.innerHTML += `<option value="${g.id}">${g.nombre}</option>`);
    };
    new bootstrap.Modal(document.getElementById('inscModal')).show();
};
window.guardarInscripcion = async () => {
    const data = {
        alumno_id: document.getElementById('alumnoIdInsc').value,
        grupo_id: document.getElementById('grupoInsc').value,
        ciclo_escolar: document.getElementById('ciclo').value,
        monto_mensual: parseFloat(document.getElementById('montoMensual').value)
    };
    const res = await fetch(`${API_URL}/inscripciones`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
    });
    if(res.ok) {
        alert('Inscripción registrada y colegiaturas generadas');
        bootstrap.Modal.getInstance(document.getElementById('inscModal')).hide();
        document.getElementById('btnVerInsc').click();
    } else alert('Error');
};

document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
cargarAlumnos();
cargarAlumnosSelect();
</script>
</body>
</html>
