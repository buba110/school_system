<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Movimientos de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>/* mismo sidebar que proveedores.html */</style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0"><!-- mismo contenido del sidebar --></div>
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-exchange-alt"></i> Movimientos de Inventario</h2>
            <div class="row mb-3">
                <div class="col-md-3"><input type="text" id="filtroProducto" class="form-control" placeholder="Producto"></div>
                <div class="col-md-3"><select id="filtroTipo" class="form-select"><option value="">Todos</option><option value="entrada">Entrada</option><option value="salida">Salida</option></select></div>
                <div class="col-md-2"><input type="date" id="filtroFecha" class="form-control"></div>
                <div class="col-md-2"><button id="btnFiltrar" class="btn btn-primary">Filtrar</button></div>
            </div>
            <table class="table table-bordered">
                <thead class="table-dark"><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Motivo</th><th>Usuario</th></tr></thead>
                <tbody id="tablaMovimientos"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
const API_URL = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

async function cargarMovimientos(filtros = {}) {
    let url = `${API_URL}/inventario/movimientos?`;
    if (filtros.producto) url += `producto=${encodeURIComponent(filtros.producto)}&`;
    if (filtros.tipo) url += `tipo=${filtros.tipo}&`;
    if (filtros.fecha) url += `fecha=${filtros.fecha}&`;
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const tbody = document.getElementById('tablaMovimientos');
    tbody.innerHTML = '';
    data.forEach(m => {
        tbody.innerHTML += `
            <tr>
                <td>${new Date(m.fecha).toLocaleString()}</td>
                <td>${m.producto_nombre}</td>
                <td>${m.tipo === 'entrada' ? '<span class="badge bg-success">Entrada</span>' : '<span class="badge bg-danger">Salida</span>'}</td>
                <td>${m.cantidad}</td>
                <td>${m.motivo}</td>
                <td>${m.usuario_nombre}</td>
            </tr>
        `;
    });
}
document.getElementById('btnFiltrar').onclick = () => {
    cargarMovimientos({
        producto: document.getElementById('filtroProducto').value,
        tipo: document.getElementById('filtroTipo').value,
        fecha: document.getElementById('filtroFecha').value
    });
};
document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
cargarMovimientos();
</script>
</body>
</html>
