<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Colegiaturas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>/* mismo sidebar que antes */</style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">... (mismo sidebar) ...</div>
        <div class="col-md-10 content p-4">
            <h2>Colegiaturas</h2>
            <div class="row">
                <div class="col-md-4">
                    <label>Seleccionar alumno</label>
                    <select id="selectAlumno" class="form-select"></select>
                    <button id="btnCargar" class="btn btn-primary mt-2">Cargar adeudos</button>
                </div>
                <div class="col-md-8">
                    <h5>Adeudos pendientes</h5>
                    <table class="table table-bordered">
                        <thead class="table-dark"><tr><th>Mes</th><th>Monto</th><th>Vencimiento</th><th>Acción</th></tr></thead>
                        <tbody id="tablaAdeudos"></tbody>
                    </table>
                    <h5 class="mt-4">Historial de pagos</h5>
                    <table class="table table-bordered">
                        <thead class="table-secondary"><tr><th>Fecha</th><th>Mes</th><th>Monto</th><th>Método</th></tr></thead>
                        <tbody id="tablaHistorial"></tbody>
                    </table>
                    <button id="btnEstadoCuenta" class="btn btn-info">Ver estado de cuenta</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API_URL = 'https://school-system-mnc1.onrender.com/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

async function cargarAlumnos() {
    const res = await fetch(`${API_URL}/alumnos`, { headers: { 'Authorization': `Bearer ${token}` } });
    const alumnos = await res.json();
    const select = document.getElementById('selectAlumno');
    select.innerHTML = '<option value="">Seleccione</option>';
    alumnos.forEach(a => select.innerHTML += `<option value="${a.id}">${a.nombre_completo} (${a.matricula})</option>`);
}
document.getElementById('btnCargar').onclick = async () => {
    const id = document.getElementById('selectAlumno').value;
    if (!id) return alert('Seleccione alumno');
    // Adeudos
    const resAde = await fetch(`${API_URL}/colegiaturas/adeudos/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const adeudos = await resAde.json();
    const tbodyAde = document.getElementById('tablaAdeudos');
    tbodyAde.innerHTML = '';
    adeudos.forEach(c => {
        const mesStr = c.mes.toString().slice(0,4)+'-'+c.mes.toString().slice(4);
        tbodyAde.innerHTML += `<tr><td>${mesStr}</td><td>$${c.monto}</td><td>${c.fecha_vencimiento || '-'}</td><td><button class="btn btn-sm btn-success" onclick="pagar(${c.id}, ${c.monto}, '${mesStr}')">Pagar</button></td></tr>`;
    });
    // Historial pagos
    const resHist = await fetch(`${API_URL}/pagos/historial/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const historial = await resHist.json();
    const tbodyHist = document.getElementById('tablaHistorial');
    tbodyHist.innerHTML = '';
    historial.forEach(p => {
        const mesStr = p.mes.toString().slice(0,4)+'-'+p.mes.toString().slice(4);
        tbodyHist.innerHTML += `<tr><td>${new Date(p.fecha_pago).toLocaleDateString()}</td><td>${mesStr}</td><td>$${p.monto}</td><td>${p.metodo_pago}</td></tr>`;
    });
};
window.pagar = async (colegiatura_id, monto, mes) => {
    const metodo = prompt('Método de pago (efectivo/tarjeta/transferencia):', 'efectivo');
    if (!metodo) return;
    const res = await fetch(`${API_URL}/pagos/colegiatura`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ colegiatura_id, monto, metodo_pago: metodo })
    });
    if (res.ok) {
        alert('Pago registrado');
        // Ticket térmico
        const contenido = `<div class="ticket"><h3>Recibo de pago</h3><p>Alumno: ${document.getElementById('selectAlumno').options[document.getElementById('selectAlumno').selectedIndex].text}</p><p>Mes: ${mes}</p><p>Monto: $${monto}</p><p>Método: ${metodo}</p><p>Fecha: ${new Date().toLocaleString()}</p><p>¡Gracias!</p></div>`;
        const ventana = window.open();
        ventana.document.write(`<html><head><style>@media print { .ticket { width: 58mm; margin: 0; font-family: monospace; } }</style></head><body onload="window.print(); window.close();">${contenido}</body></html>`);
        document.getElementById('btnCargar').click();
    } else alert('Error');
};
document.getElementById('btnEstadoCuenta').onclick = async () => {
    const id = document.getElementById('selectAlumno').value;
    if (!id) return alert('Seleccione alumno');
    const res = await fetch(`${API_URL}/pagos/estado-cuenta/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    alert(`Total pagado: $${data.total_pagado}\nTotal adeudo: $${data.total_adeudo}\nSaldo pendiente: $${data.saldo}`);
};
cargarAlumnos();
</script>
</body>
</html>
