<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corte de Caja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .content { background: #f8f9fa; min-height: 100vh; }
        @media print { .ticket { width: 80mm; margin: 0 auto; font-family: monospace; } }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="text-center py-3 bg-dark text-white"><h5><i class="fas fa-school"></i> Escuela</h5></div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="alumnos.html"><i class="fas fa-users"></i> Alumnos</a>
            <a href="grados.html"><i class="fas fa-layer-group"></i> Grados</a>
            <a href="grupos.html"><i class="fas fa-users-between"></i> Grupos</a>
            <a href="materias.html"><i class="fas fa-book"></i> Materias</a>
            <a href="colegiaturas.html"><i class="fas fa-dollar-sign"></i> Colegiaturas</a>
            <a href="pos.html"><i class="fas fa-shopping-cart"></i> Punto de Venta</a>
            <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
            <a href="proveedores.html"><i class="fas fa-truck"></i> Proveedores</a>
            <a href="movimientos.html"><i class="fas fa-exchange-alt"></i> Movimientos</a>
            <a href="usuarios.html"><i class="fas fa-user-shield"></i> Usuarios</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="cortes.html"><i class="fas fa-cash-register"></i> Corte de Caja</a>
            <a href="#" id="logoutBtn" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-cash-register"></i> Corte de Caja</h2>
            <div class="row">
                <div class="col-md-6">
                    <button id="abrirCajaBtn" class="btn btn-primary mb-2"><i class="fas fa-unlock-alt"></i> Abrir Caja</button>
                    <button id="cerrarCajaBtn" class="btn btn-danger mb-2"><i class="fas fa-lock"></i> Cerrar Caja</button>
                </div>
                <div class="col-md-6">
                    <div id="estadoCaja" class="alert alert-info">Consultando...</div>
                </div>
            </div>
            <div id="historialCortes" class="mt-4">
                <h5>Historial de cortes</h5>
                <table class="table table-bordered">
                    <thead class="table-dark"><tr><th>Fecha apertura</th><th>Fecha cierre</th><th>Monto apertura</th><th>Monto cierre</th><th>Diferencia</th></thead>
                    <tbody id="tablaHistorial"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal abrir caja -->
<div class="modal fade" id="modalAbrirCaja" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5>Abrir Caja</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <label>Monto apertura ($):</label><input type="number" id="montoApertura" class="form-control" step="0.01" value="0">
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button id="confirmarAbrir" class="btn btn-primary">Abrir</button></div>
        </div>
    </div>
</div>

<!-- Modal cierre -->
<div class="modal fade" id="modalCierre" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5>Cerrar Caja</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div id="infoCierre"></div>
                <label>Monto real contado ($):</label><input type="number" id="montoReal" class="form-control" step="0.01">
                <div id="diferenciaPreview" class="mt-2"></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button id="confirmarCierre" class="btn btn-danger">Cerrar Caja</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'https://school-system-mnc1.onrender.com/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

let cajaAbierta = false, datosCierre = null;

async function actualizarEstado() {
    const res = await fetch(`${API_URL}/caja/estado`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    cajaAbierta = data.abierto;
    const estadoDiv = document.getElementById('estadoCaja');
    if (cajaAbierta) {
        estadoDiv.className = 'alert alert-success';
        estadoDiv.innerHTML = `<strong>Caja ABIERTA</strong> desde ${new Date(data.corte.fecha_apertura).toLocaleString()}<br>Monto apertura: $${data.corte.monto_apertura}`;
    } else {
        estadoDiv.className = 'alert alert-danger';
        estadoDiv.innerHTML = '<strong>Caja CERRADA</strong>';
    }
}
async function cargarHistorial() {
    const res = await fetch(`${API_URL}/caja/historial`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const tbody = document.getElementById('tablaHistorial');
    tbody.innerHTML = '';
    data.forEach(c => {
        tbody.innerHTML += `<tr><td>${new Date(c.fecha_apertura).toLocaleString()}</td><td>${c.fecha_cierre ? new Date(c.fecha_cierre).toLocaleString() : '-'}</td><td>$${c.monto_apertura}</td><td>$${c.monto_cierre || 0}</td><td>$${c.diferencia || 0}</td></tr>`;
    });
}
document.getElementById('abrirCajaBtn').onclick = () => { new bootstrap.Modal(document.getElementById('modalAbrirCaja')).show(); };
document.getElementById('confirmarAbrir').onclick = async () => {
    const monto = parseFloat(document.getElementById('montoApertura').value);
    const res = await fetch(`${API_URL}/caja/abrir`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ monto_apertura: monto })
    });
    if (res.ok) { alert('Caja abierta'); bootstrap.Modal.getInstance(document.getElementById('modalAbrirCaja')).hide(); actualizarEstado(); cargarHistorial(); }
    else alert('Error');
};
document.getElementById('cerrarCajaBtn').onclick = async () => {
    if (!cajaAbierta) return alert('No hay caja abierta');
    const res = await fetch(`${API_URL}/caja/cerrar`, { headers: { 'Authorization': `Bearer ${token}` } });
    datosCierre = await res.json();
    document.getElementById('infoCierre').innerHTML = `
        <p>Monto apertura: $${datosCierre.apertura}</p>
        <p>Ventas efectivo: $${datosCierre.totalVentas}</p>
        <p>Colegiaturas efectivo: $${datosCierre.totalColeg}</p>
        <p><strong>Monto esperado: $${datosCierre.montoEsperado}</strong></p>`;
    document.getElementById('montoReal').value = '';
    document.getElementById('diferenciaPreview').innerHTML = '';
    new bootstrap.Modal(document.getElementById('modalCierre')).show();
};
document.getElementById('montoReal').addEventListener('input', () => {
    const real = parseFloat(document.getElementById('montoReal').value) || 0;
    const diff = real - datosCierre.montoEsperado;
    document.getElementById('diferenciaPreview').innerHTML = diff >= 0 ? `Sobrante: $${diff}` : `Faltante: $${Math.abs(diff)}`;
});
document.getElementById('confirmarCierre').onclick = async () => {
    const real = parseFloat(document.getElementById('montoReal').value);
    if (isNaN(real)) return alert('Ingrese el monto real');
    const res = await fetch(`${API_URL}/caja/cerrar-confirmar`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ monto_real: real, total_ventas: datosCierre.totalVentas, total_colegiaturas: datosCierre.totalColeg })
    });
    if (res.ok) {
        const data = await res.json();
        alert(`Caja cerrada. Diferencia: ${data.diferencia >= 0 ? `Sobrante $${data.diferencia}` : `Faltante $${Math.abs(data.diferencia)}`}`);
        bootstrap.Modal.getInstance(document.getElementById('modalCierre')).hide();
        actualizarEstado();
        cargarHistorial();
        // Imprimir ticket de cierre
        const contenido = `<div class="ticket"><h3>Cierre de Caja</h3><p>Fecha: ${new Date().toLocaleString()}</p><hr><p>Monto apertura: $${datosCierre.apertura}</p><p>Ventas efectivo: $${datosCierre.totalVentas}</p><p>Colegiaturas efectivo: $${datosCierre.totalColeg}</p><p><strong>Esperado: $${datosCierre.montoEsperado}</strong></p><p>Real contado: $${real}</p><p>Diferencia: ${data.diferencia}</p><hr><p>Firma cajero: ___________</p></div>`;
        const ventana = window.open();
        ventana.document.write(`<html><head><style>@media print { .ticket { width: 80mm; margin: 0; font-family: monospace; } }</style></head><body onload="window.print(); window.close();">${contenido}</body></html>`);
    } else alert('Error al cerrar caja');
};
document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
actualizarEstado();
cargarHistorial();
</script>
</body>
</html>
