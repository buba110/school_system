<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes - Control Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .content { background: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="text-center py-3 bg-dark text-white"><h5><i class="fas fa-school"></i> Escuela</h5></div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="alumnos.html"><i class="fas fa-users"></i> Alumnos</a>
            <a href="grados.html"><i class="fas fa-layer-group"></i> Grados</a>
            <a href="grupos.html"><i class="fas fa-users-between"></i> Grupos</a>
            <a href="materias.html"><i class="fas fa-book"></i> Materias</a>
            <a href="colegiaturas.html"><i class="fas fa-dollar-sign"></i> Colegiaturas</a>
            <a href="pos.html"><i class="fas fa-shopping-cart"></i> Punto de Venta</a>
            <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
            <a href="proveedores.html"><i class="fas fa-truck"></i> Proveedores</a>
            <a href="movimientos.html"><i class="fas fa-exchange-alt"></i> Movimientos</a>
            <a href="usuarios.html"><i class="fas fa-user-shield"></i> Usuarios</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="cortes.html"><i class="fas fa-cash-register"></i> Corte de Caja</a>
            <a href="#" id="logoutBtn" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-chart-line"></i> Reportes</h2>
            <div class="row mb-3">
                <div class="col-md-3"><label>Fecha inicio</label><input type="date" id="fechaInicio" class="form-control"></div>
                <div class="col-md-3"><label>Fecha fin</label><input type="date" id="fechaFin" class="form-control"></div>
                <div class="col-md-2"><button id="btnFiltrar" class="btn btn-primary mt-4">Filtrar</button></div>
                <div class="col-md-2"><button id="btnExportar" class="btn btn-success mt-4">Exportar CSV</button></div>
                <div class="col-md-2"><button id="btnImprimir" class="btn btn-secondary mt-4">Imprimir</button></div>
            </div>
            <div class="row">
                <div class="col-md-6"><canvas id="chartIngresos" height="250"></canvas></div>
                <div class="col-md-6"><canvas id="chartMorosos" height="250"></canvas></div>
            </div>
            <div class="row mt-4">
                <div class="col-md-12">
                    <h5>Detalle de ingresos</h5>
                    <table class="table table-bordered" id="tablaIngresos">
                        <thead class="table-dark"><tr><th>Día</th><th>Ingresos ($)</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
const API_URL = 'https://school-system-mnc1.onrender.com/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

let chartIngresos, chartMorosos;

async function cargarReportes(fechaInicio, fechaFin) {
    // Ingresos por período
    const urlIngresos = `${API_URL}/reportes/ingresos-periodo?fechaInicio=${fechaInicio}&fechaFin=${fechaFin}`;
    const resIngresos = await fetch(urlIngresos, { headers: { 'Authorization': `Bearer ${token}` } });
    const ingresos = await resIngresos.json();
    const tbody = document.querySelector('#tablaIngresos tbody');
    tbody.innerHTML = '';
    ingresos.forEach(d => {
        tbody.innerHTML += `<tr><td>${d.dia}</td><td>$${d.total}</td></tr>`;
    });
    if (chartIngresos) chartIngresos.destroy();
    chartIngresos = new Chart(document.getElementById('chartIngresos'), {
        type: 'line',
        data: { labels: ingresos.map(d => d.dia), datasets: [{ label: 'Ingresos ($)', data: ingresos.map(d => d.total), borderColor: 'blue' }] }
    });
    // Alumnos morosos (sin filtro)
    const resMorosos = await fetch(`${API_URL}/reportes/alumnos-morosos`, { headers: { 'Authorization': `Bearer ${token}` } });
    const morosos = await resMorosos.json();
    if (chartMorosos) chartMorosos.destroy();
    chartMorosos = new Chart(document.getElementById('chartMorosos'), {
        type: 'bar',
        data: { labels: morosos.map(m => m.nombre_completo), datasets: [{ label: 'Adeudo ($)', data: morosos.map(m => m.total_adeudo), backgroundColor: 'orange' }] }
    });
}
document.getElementById('btnFiltrar').onclick = () => {
    const inicio = document.getElementById('fechaInicio').value;
    const fin = document.getElementById('fechaFin').value;
    if (!inicio || !fin) return alert('Seleccione ambas fechas');
    cargarReportes(inicio, fin);
};
document.getElementById('btnExportar').onclick = () => {
    const rows = document.querySelectorAll('#tablaIngresos tbody tr');
    let csv = "Día,Ingresos\n";
    rows.forEach(row => {
        const cols = row.querySelectorAll('td');
        csv += `${cols[0].innerText},${cols[1].innerText.replace('$','')}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'reporte_ingresos.csv'; a.click();
};
document.getElementById('btnImprimir').onclick = () => { window.print(); };
document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
// Cargar último mes por defecto
const hoy = new Date();
const hace30 = new Date(); hace30.setDate(hoy.getDate() - 30);
document.getElementById('fechaInicio').value = hace30.toISOString().split('T')[0];
document.getElementById('fechaFin').value = hoy.toISOString().split('T')[0];
cargarReportes(document.getElementById('fechaInicio').value, document.getElementById('fechaFin').value);
</script>
</body>
</html>
