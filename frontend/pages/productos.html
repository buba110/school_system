<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .content { background: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="text-center py-3 bg-dark text-white"><h5><i class="fas fa-school"></i> Escuela</h5></div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="alumnos.html"><i class="fas fa-users"></i> Alumnos</a>
            <a href="colegiaturas.html"><i class="fas fa-dollar-sign"></i> Colegiaturas</a>
            <a href="pos.html"><i class="fas fa-shopping-cart"></i> Punto de Venta</a>
            <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
            <a href="usuarios.html"><i class="fas fa-user-shield"></i> Usuarios</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="cortes.html"><i class="fas fa-cash-register"></i> Corte de Caja</a>
            <a href="#" id="logoutBtn" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-box"></i> Inventario</h2>
            <button class="btn btn-success mb-3" onclick="nuevoProducto()"><i class="fas fa-plus"></i> Nuevo Producto</button>
            <table class="table table-bordered table-hover">
                <thead class="table-dark"><tr><th>Código</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Stock Mínimo</th><th>Acciones</th></tr></thead>
                <tbody id="tablaProductos"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="productoModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5 class="modal-title">Producto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="productoId">
                <div class="mb-2"><label>Código</label><input id="codigo" class="form-control" required></div>
                <div class="mb-2"><label>Nombre</label><input id="nombre" class="form-control" required></div>
                <div class="mb-2"><label>Precio</label><input id="precio" type="number" step="0.01" class="form-control" required></div>
                <div class="mb-2"><label>Stock</label><input id="stock" type="number" class="form-control" required></div>
                <div class="mb-2"><label>Stock Mínimo (alerta)</label><input id="stock_minimo" type="number" class="form-control" required></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" onclick="guardarProducto()">Guardar</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';
let editId = null;

async function cargarProductos() {
    const res = await fetch(`${API_URL}/productos`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const tbody = document.getElementById('tablaProductos');
    tbody.innerHTML = '';
    data.forEach(p => {
        tbody.innerHTML += `
            <tr>
                <td>${p.codigo}</td><td>${p.nombre}</td><td>$${p.precio}</td><td>${p.stock}</td><td>${p.stock_minimo}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editarProducto(${p.id})"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="eliminarProducto(${p.id})"><i class="fas fa-trash"></i> Eliminar</button>
                </td>
            </tr>
        `;
    });
}
function nuevoProducto() {
    editId = null;
    document.getElementById('productoId').value = '';
    document.getElementById('codigo').value = '';
    document.getElementById('nombre').value = '';
    document.getElementById('precio').value = '';
    document.getElementById('stock').value = '';
    document.getElementById('stock_minimo').value = '';
    new bootstrap.Modal(document.getElementById('productoModal')).show();
}
async function editarProducto(id) {
    const res = await fetch(`${API_URL}/productos/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const p = await res.json();
    editId = p.id;
    document.getElementById('productoId').value = p.id;
    document.getElementById('codigo').value = p.codigo;
    document.getElementById('nombre').value = p.nombre;
    document.getElementById('precio').value = p.precio;
    document.getElementById('stock').value = p.stock;
    document.getElementById('stock_minimo').value = p.stock_minimo;
    new bootstrap.Modal(document.getElementById('productoModal')).show();
}
async function entradaCompra(idProducto, nombreProducto) {
    const cantidad = prompt(`¿Cuántas unidades de ${nombreProducto} desea agregar?`);
    if (!cantidad) return;
    // Obtener proveedores para seleccionar
    const resProv = await fetch(`${API_URL}/proveedores`, { headers: { 'Authorization': `Bearer ${token}` } });
    const proveedores = await resProv.json();
    let proveedorIds = proveedores.map(p => `${p.id} - ${p.nombre}`).join('\n');
    let proveedorId = prompt(`Seleccione proveedor (ingrese el ID):\n${proveedorIds}`);
    if (!proveedorId) return;
    proveedorId = parseInt(proveedorId.split(' ')[0]);
    const res = await fetch(`${API_URL}/inventario/movimientos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({
            producto_id: idProducto,
            tipo: 'entrada',
            cantidad: parseInt(cantidad),
            motivo: 'compra',
            proveedor_id: proveedorId
        })
    });
    if (res.ok) {
        alert('Stock actualizado');
        cargarProductos(); // refrescar tabla
    } else alert('Error');
}
async function guardarProducto() {
    const data = {
        codigo: document.getElementById('codigo').value,
        nombre: document.getElementById('nombre').value,
        precio: parseFloat(document.getElementById('precio').value),
        stock: parseInt(document.getElementById('stock').value),
        stock_minimo: parseInt(document.getElementById('stock_minimo').value),
        activo: true
    };
    const method = editId ? 'PUT' : 'POST';
    const url = editId ? `${API_URL}/productos/${editId}` : `${API_URL}/productos`;
    const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
    });
    if (res.ok) {
        alert('Producto guardado');
        bootstrap.Modal.getInstance(document.getElementById('productoModal')).hide();
        cargarProductos();
    } else alert('Error');
}
async function eliminarProducto(id) {
    if (confirm('¿Eliminar producto?')) {
        await fetch(`${API_URL}/productos/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        cargarProductos();
    }
}
document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
cargarProductos();
</script>
</body>
</html>
