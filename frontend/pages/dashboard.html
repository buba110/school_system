<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Control Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .content { background: #f8f9fa; min-height: 100vh; }
        .card-stats { transition: transform 0.2s; }
        .card-stats:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-0">
            <div class="text-center py-3 bg-dark text-white"><h5><i class="fas fa-school"></i> Escuela</h5></div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="alumnos.html"><i class="fas fa-users"></i> Alumnos</a>
            <a href="grados.html"><i class="fas fa-layer-group"></i> Grados</a>
            <a href="grupos.html"><i class="fas fa-users-between"></i> Grupos</a>
            <a href="materias.html"><i class="fas fa-book"></i> Materias</a>
            <a href="colegiaturas.html"><i class="fas fa-dollar-sign"></i> Colegiaturas</a>
            <a href="pos.html"><i class="fas fa-shopping-cart"></i> Punto de Venta</a>
            <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
            <a href="proveedores.html"><i class="fas fa-truck"></i> Proveedores</a>
            <a href="movimientos.html"><i class="fas fa-exchange-alt"></i> Movimientos</a>
            <a href="usuarios.html"><i class="fas fa-user-shield"></i> Usuarios</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="cortes.html"><i class="fas fa-cash-register"></i> Corte de Caja</a>
            <a href="#" id="logoutBtn" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>

        <!-- Contenido -->
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-tachometer-alt"></i> Dashboard</h2>
            <div class="row mt-4">
                <div class="col-md-3 mb-3"><div class="card card-stats bg-primary text-white"><div class="card-body"><h5>Alumnos</h5><h2 id="totalAlumnos">-</h2></div></div></div>
                <div class="col-md-3 mb-3"><div class="card card-stats bg-success text-white"><div class="card-body"><h5>Ingresos Hoy</h5><h2 id="ingresosHoy">$0</h2></div></div></div>
                <div class="col-md-3 mb-3"><div class="card card-stats bg-warning text-white"><div class="card-body"><h5>Adeudos Totales</h5><h2 id="adeudosTotal">$0</h2></div></div></div>
                <div class="col-md-3 mb-3"><div class="card card-stats bg-danger text-white"><div class="card-body"><h5>Stock Bajo</h5><h2 id="stockBajo">0</h2></div></div></div>
            </div>
            <div class="row mt-4">
                <div class="col-md-6"><canvas id="ingresosChart" height="250"></canvas></div>
                <div class="col-md-6"><canvas id="productosChart" height="250"></canvas></div>
            </div>
        </div>
    </div>
</div>
<script>
const API_URL = 'https://schoolsystem-production-5087.up.railway.app/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

async function cargarDashboard() {
    try {
        // Alumnos
        const alumnos = await fetch(`${API_URL}/alumnos`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
        document.getElementById('totalAlumnos').innerText = alumnos.length;

        // Ingresos hoy (todas las ventas, sin filtrar por método)
        const ventasHoy = await fetch(`${API_URL}/reportes/ingresos-ventas?days=1`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
        const totalHoy = ventasHoy.reduce((s,d)=>s+d.total,0);
        document.getElementById('ingresosHoy').innerText = `$${totalHoy}`;

        // Adeudos totales
        const morosos = await fetch(`${API_URL}/reportes/alumnos-morosos`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
        const totalAdeudos = morosos.reduce((s,m)=>s+parseFloat(m.total_adeudo),0);
        document.getElementById('adeudosTotal').innerText = `$${totalAdeudos}`;

        // Stock bajo
        const productos = await fetch(`${API_URL}/productos`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
        const stockBajo = productos.filter(p => p.stock <= p.stock_minimo).length;
        document.getElementById('stockBajo').innerText = stockBajo;

        // Gráfico ingresos últimos 30 días
        const ingresos30 = await fetch(`${API_URL}/reportes/ingresos-ventas?days=30`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
        new Chart(document.getElementById('ingresosChart'), {
            type: 'line',
            data: { labels: ingresos30.map(d=>d.dia), datasets: [{ label: 'Ingresos ($)', data: ingresos30.map(d=>d.total), borderColor: 'blue' }] }
        });

        // Productos más vendidos
        const top = await fetch(`${API_URL}/reportes/productos-mas-vendidos`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
        new Chart(document.getElementById('productosChart'), {
            type: 'bar',
            data: { labels: top.map(p=>p.nombre), datasets: [{ label: 'Unidades vendidas', data: top.map(p=>p.total_vendido), backgroundColor: 'orange' }] }
        });
    } catch(e) { console.error(e); }
}
document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
cargarDashboard();
</script>
</body>
</html>
