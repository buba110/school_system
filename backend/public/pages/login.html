<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light"><div class="container mt-5"><div class="row justify-content-center"><div class="col-md-4"><div class="card"><div class="card-header bg-primary text-white">Control Escolar</div><div class="card-body">
<form id="loginForm"><div class="mb-3"><label>Email</label><input type="email" id="email" class="form-control" required></div><div class="mb-3"><label>Contraseña</label><input type="password" id="password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100">Ingresar</button></form>
<div id="errorMsg" class="alert alert-danger mt-3 d-none"></div></div></div></div></div></div>
<script>const API_URL='http://localhost:3000/api'; document.getElementById('loginForm').addEventListener('submit', async(e)=>{ e.preventDefault(); const email=document.getElementById('email').value; const password=document.getElementById('password').value; try{ const res=await fetch(API_URL+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})}); if(!res.ok)throw new Error('Credenciales inválidas'); const data=await res.json(); localStorage.setItem('token',data.token); localStorage.setItem('user',JSON.stringify(data.user)); window.location.href='dashboard.html'; }catch(err){ document.getElementById('errorMsg').textContent=err.message; document.getElementById('errorMsg').classList.remove('d-none'); } });</script></body></html>
