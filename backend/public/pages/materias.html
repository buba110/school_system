<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Materias - Control Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .content { background: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="text-center py-3 bg-dark text-white"><h5><i class="fas fa-school"></i> Escuela</h5></div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="alumnos.html"><i class="fas fa-users"></i> Alumnos</a>
            <a href="grados.html"><i class="fas fa-layer-group"></i> Grados</a>
            <a href="grupos.html"><i class="fas fa-users-between"></i> Grupos</a>
            <a href="materias.html"><i class="fas fa-book"></i> Materias</a>
            <a href="colegiaturas.html"><i class="fas fa-dollar-sign"></i> Colegiaturas</a>
            <a href="pos.html"><i class="fas fa-shopping-cart"></i> Punto de Venta</a>
            <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
            <a href="usuarios.html"><i class="fas fa-user-shield"></i> Usuarios</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="cortes.html"><i class="fas fa-cash-register"></i> Corte de Caja</a>
            <a href="#" id="logoutBtn" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-book"></i> Materias</h2>
            <button class="btn btn-success mb-3" onclick="mostrarModal()"><i class="fas fa-plus"></i> Nueva Materia</button>
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr><th>ID</th><th>Nombre</th><th>Grado</th><th>Acciones</th></tr>
                </thead>
                <tbody id="tablaMaterias"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para crear/editar materia -->
<div class="modal fade" id="materiaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5 class="modal-title">Materia</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="materiaId">
                <div class="mb-2"><label>Nombre de la materia</label><input id="nombre" class="form-control" required></div>
                <div class="mb-2"><label>Grado</label><select id="grado_id" class="form-select" required></select></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" onclick="guardarMateria()">Guardar</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

let editId = null;

// Cargar lista de materias
async function cargarMaterias() {
    const res = await fetch(`${API_URL}/catalogos/materias`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    const tbody = document.getElementById('tablaMaterias');
    tbody.innerHTML = '';
    data.forEach(m => {
        tbody.innerHTML += `
            <tr>
                <td>${m.id}</td>
                <td>${m.nombre}</td>
                <td>${m.grado_nombre || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editarMateria(${m.id})"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn btn-sm btn-danger" onclick="eliminarMateria(${m.id})"><i class="fas fa-trash"></i> Eliminar</button>
                </td>
            </tr>
        `;
    });
}

// Cargar grados en el select
async function cargarGradosSelect() {
    const res = await fetch(`${API_URL}/catalogos/grados`, { headers: { 'Authorization': `Bearer ${token}` } });
    const grados = await res.json();
    const select = document.getElementById('grado_id');
    select.innerHTML = '<option value="">Seleccione un grado</option>';
    grados.forEach(g => {
        select.innerHTML += `<option value="${g.id}">${g.nombre}</option>`;
    });
}

function mostrarModal() {
    editId = null;
    document.getElementById('materiaId').value = '';
    document.getElementById('nombre').value = '';
    document.getElementById('grado_id').value = '';
    cargarGradosSelect();
    new bootstrap.Modal(document.getElementById('materiaModal')).show();
}

async function editarMateria(id) {
    const res = await fetch(`${API_URL}/catalogos/materias/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const m = await res.json();
    editId = m.id;
    document.getElementById('materiaId').value = m.id;
    document.getElementById('nombre').value = m.nombre;
    await cargarGradosSelect();
    document.getElementById('grado_id').value = m.grado_id;
    new bootstrap.Modal(document.getElementById('materiaModal')).show();
}

async function guardarMateria() {
    const data = {
        nombre: document.getElementById('nombre').value,
        grado_id: parseInt(document.getElementById('grado_id').value)
    };
    if (!data.nombre || !data.grado_id) {
        alert('Complete todos los campos');
        return;
    }
    const method = editId ? 'PUT' : 'POST';
    const url = editId ? `${API_URL}/catalogos/materias/${editId}` : `${API_URL}/catalogos/materias`;
    const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
    });
    if (res.ok) {
        alert('Materia guardada');
        bootstrap.Modal.getInstance(document.getElementById('materiaModal')).hide();
        cargarMaterias();
    } else {
        const err = await res.json();
        alert(err.message || 'Error al guardar');
    }
}

async function eliminarMateria(id) {
    if (confirm('¿Eliminar esta materia?')) {
        const res = await fetch(`${API_URL}/catalogos/materias/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) {
            cargarMaterias();
        } else alert('Error al eliminar');
    }
}

document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
cargarMaterias();
</script>
</body>
</html>
