<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Control Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar { background: #2c3e50; min-height: 100vh; }
        .sidebar a { color: #ecf0f1; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; padding-left: 30px; }
        .sidebar a i { width: 25px; margin-right: 10px; }
        .content { background: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="text-center py-3 bg-dark text-white"><h5><i class="fas fa-school"></i> Escuela</h5></div>
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="alumnos.html"><i class="fas fa-users"></i> Alumnos</a>
            <a href="colegiaturas.html"><i class="fas fa-dollar-sign"></i> Colegiaturas</a>
            <a href="pos.html"><i class="fas fa-shopping-cart"></i> Punto de Venta</a>
            <a href="productos.html"><i class="fas fa-box"></i> Productos</a>
            <a href="usuarios.html"><i class="fas fa-user-shield"></i> Usuarios</a>
            <a href="reportes.html"><i class="fas fa-chart-line"></i> Reportes</a>
            <a href="cortes.html"><i class="fas fa-cash-register"></i> Corte de Caja</a>
            <a href="#" id="logoutBtn" class="text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
        </div>
        <div class="col-md-10 content p-4">
            <h2><i class="fas fa-user-shield"></i> Gestión de Usuarios</h2>
            <button class="btn btn-success mb-3" onclick="mostrarModal()"><i class="fas fa-plus"></i> Nuevo Usuario</button>
            <table class="table table-bordered table-hover">
                <thead class="table-dark"><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Activo</th><th>Expiración</th><th>Acciones</th></tr></thead>
                <tbody id="tablaUsuarios"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="usuarioModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white"><h5 class="modal-title">Usuario</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="userId">
                <div class="mb-2"><label>Nombre completo</label><input id="nombre" class="form-control" required></div>
                <div class="mb-2"><label>Email</label><input id="email" class="form-control" required></div>
                <div class="mb-2"><label>Contraseña</label><input id="password" type="password" class="form-control"></div>
                <div class="mb-2"><label>Rol</label><select id="rol" class="form-select"><option value="cajero">Cajero</option><option value="subadmin">Subadministrador</option><option value="administrador">Administrador</option></select></div>
                <div class="mb-2"><label>Fecha expiración (opcional)</label><input id="fecha_expiracion" type="date" class="form-control"></div>
                <div class="mb-2"><label>Activo</label><select id="activo" class="form-select"><option value="1">Sí</option><option value="0">No</option></select></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-primary" onclick="guardarUsuario()">Guardar</button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_URL = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';
let editId = null;

async function cargarUsuarios() {
    try {
        const res = await fetch(`${API_URL}/usuarios`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const tbody = document.getElementById('tablaUsuarios');
        tbody.innerHTML = '';
        data.forEach(u => {
            tbody.innerHTML += `
                <tr>
                    <td>${u.nombre_completo}</td><td>${u.email}</td><td>${u.rol_nombre}</td>
                    <td>${u.activo ? 'Sí' : 'No'}一
                    <td>${u.fecha_expiracion ? u.fecha_expiracion.split('T')[0] : '-'}一
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editarUsuario(${u.id})"><i class="fas fa-edit"></i> Editar</button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarUsuario(${u.id})"><i class="fas fa-trash"></i> Eliminar</button>
                    </td>
                </tr>
            `;
        });
    } catch(e) { console.error(e); }
}
function mostrarModal() {
    editId = null;
    document.getElementById('userId').value = '';
    document.getElementById('nombre').value = '';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    document.getElementById('rol').value = 'cajero';
    document.getElementById('fecha_expiracion').value = '';
    document.getElementById('activo').value = '1';
    new bootstrap.Modal(document.getElementById('usuarioModal')).show();
}
async function editarUsuario(id) {
    const res = await fetch(`${API_URL}/usuarios/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const u = await res.json();
    editId = u.id;
    document.getElementById('userId').value = u.id;
    document.getElementById('nombre').value = u.nombre_completo;
    document.getElementById('email').value = u.email;
    document.getElementById('password').value = '';
    document.getElementById('rol').value = u.rol_nombre;
    document.getElementById('fecha_expiracion').value = u.fecha_expiracion ? u.fecha_expiracion.split('T')[0] : '';
    document.getElementById('activo').value = u.activo ? '1' : '0';
    new bootstrap.Modal(document.getElementById('usuarioModal')).show();
}
async function guardarUsuario() {
    const data = {
        nombre_completo: document.getElementById('nombre').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        rol_nombre: document.getElementById('rol').value,
        fecha_expiracion: document.getElementById('fecha_expiracion').value || null,
        activo: parseInt(document.getElementById('activo').value)
    };
    const method = editId ? 'PUT' : 'POST';
    const url = editId ? `${API_URL}/usuarios/${editId}` : `${API_URL}/usuarios`;
    try {
        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(data)
        });
        if (res.ok) {
            alert('Usuario guardado');
            bootstrap.Modal.getInstance(document.getElementById('usuarioModal')).hide();
            cargarUsuarios();
        } else alert('Error al guardar');
    } catch(e) { alert('Error de conexión'); }
}
async function eliminarUsuario(id) {
    if (confirm('¿Desactivar usuario?')) {
        await fetch(`${API_URL}/usuarios/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        cargarUsuarios();
    }
}
document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'login.html'; };
cargarUsuarios();
</script>
</body>
</html>
